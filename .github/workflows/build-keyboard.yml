      - name: Create Kotlin code
        run: |
          K="app/src/main/java/com/custom/keyboard"

          # ══════════════════════════════════════
          # EmojiItem.kt
          # ══════════════════════════════════════
          cat > "$K/EmojiItem.kt" << 'EOF'
          package com.custom.keyboard
          import android.graphics.Bitmap
          data class EmojiItem(val name: String, val fileName: String, val bitmap: Bitmap?)
          EOF

          # ══════════════════════════════════════
          # EmojiLoader.kt
          # ══════════════════════════════════════
          cat > "$K/EmojiLoader.kt" << 'EOF'
          package com.custom.keyboard
          import android.content.Context
          import android.graphics.BitmapFactory
          import android.util.Log
          import org.json.JSONArray

          object EmojiLoader {
              fun loadAll(ctx: Context): List<EmojiItem> {
                  val list = mutableListOf<EmojiItem>()
                  try {
                      val json = ctx.assets.open("emoji/catalog.json").bufferedReader().use { it.readText() }
                      val arr = JSONArray(json)
                      for (i in 0 until arr.length()) {
                          val o = arr.getJSONObject(i)
                          val name = o.getString("name"); val file = o.getString("file")
                          if (!file.lowercase().endsWith(".png")) continue
                          val bmp = try { ctx.assets.open("emoji/$file").use { BitmapFactory.decodeStream(it) } }
                          catch (e: Exception) { null }
                          if (bmp != null) list.add(EmojiItem(name, file, bmp))
                      }
                  } catch (e: Exception) {
                      Log.e("EmojiLoader", "Fallback scan", e)
                      try {
                          (ctx.assets.list("emoji") ?: emptyArray()).sorted().forEach { f ->
                              if (f == "catalog.json" || !f.lowercase().endsWith(".png")) return@forEach
                              val bmp = try { ctx.assets.open("emoji/$f").use { BitmapFactory.decodeStream(it) } }
                              catch (ex: Exception) { null }
                              if (bmp != null) list.add(EmojiItem(f.substringBeforeLast("."), f, bmp))
                          }
                      } catch (ex: Exception) { Log.e("EmojiLoader", "Scan failed", ex) }
                  }
                  return list
              }
          }
          EOF

          # ══════════════════════════════════════
          # EmojiAdapter.kt
          # ══════════════════════════════════════
          cat > "$K/EmojiAdapter.kt" << 'EOF'
          package com.custom.keyboard
          import android.view.LayoutInflater; import android.view.View; import android.view.ViewGroup
          import android.widget.ImageView; import androidx.recyclerview.widget.RecyclerView
          class EmojiAdapter(
              private val items: List<EmojiItem>,
              private val onClick: (EmojiItem) -> Unit,
              private val onLongClick: (EmojiItem) -> Unit
          ) : RecyclerView.Adapter<EmojiAdapter.VH>() {
              class VH(v: View) : RecyclerView.ViewHolder(v) { val iv: ImageView = v.findViewById(R.id.ivEmoji) }
              override fun onCreateViewHolder(p: ViewGroup, t: Int) =
                  VH(LayoutInflater.from(p.context).inflate(R.layout.item_emoji, p, false))
              override fun onBindViewHolder(h: VH, pos: Int) {
                  val e = items[pos]; h.iv.setImageBitmap(e.bitmap); h.iv.contentDescription = e.name
                  h.itemView.setOnClickListener { onClick(e) }
                  h.itemView.setOnLongClickListener { onLongClick(e); true }
              }
              override fun getItemCount() = items.size
          }
          EOF

          # ══════════════════════════════════════
          # KeyboardLayoutManager.kt — раскладки
          # ══════════════════════════════════════
          cat > "$K/KeyboardLayoutManager.kt" << 'EOF'
          package com.custom.keyboard

          object KeyboardLayoutManager {
              enum class Lang { EN, RU }

              val EN_ROW1 = listOf("q","w","e","r","t","y","u","i","o","p")
              val EN_ROW2 = listOf("a","s","d","f","g","h","j","k","l")
              val EN_ROW3 = listOf("z","x","c","v","b","n","m")

              val RU_ROW1 = listOf("й","ц","у","к","е","н","г","ш","щ","з","х","ъ")
              val RU_ROW2 = listOf("ф","ы","в","а","п","р","о","л","д","ж","э")
              val RU_ROW3 = listOf("я","ч","с","м","и","т","ь","б","ю")

              val NUM_ROW1 = listOf("1","2","3","4","5","6","7","8","9","0")
              val NUM_ROW2 = listOf("@","#","$","%","&","-","+","(",")","!")
              val NUM_ROW3 = listOf("*","\"","'",":",";",",","?")
              val NUM_ROW4_LEFT = listOf("ABC")
              val NUM_ROW4_RIGHT = listOf(".")

              val SYM_ROW1 = listOf("~","`","|","·","√","π","÷","×","¶","∆")
              val SYM_ROW2 = listOf("£","€","¥","¢","^","°","=","{","}","\\")
              val SYM_ROW3 = listOf("©","®","™","✓","[","]","<",">")

              fun getRows(lang: Lang): Triple<List<String>, List<String>, List<String>> {
                  return when (lang) {
                      Lang.EN -> Triple(EN_ROW1, EN_ROW2, EN_ROW3)
                      Lang.RU -> Triple(RU_ROW1, RU_ROW2, RU_ROW3)
                  }
              }
          }
          EOF

          # ══════════════════════════════════════
          # NestorKeyboardService.kt — ПОЛНАЯ КЛАВИАТУРА
          # ══════════════════════════════════════
          cat > "$K/NestorKeyboardService.kt" << 'KOTLIN_EOF'
          package com.custom.keyboard

          import android.content.ClipData
          import android.content.ClipDescription
          import android.content.ClipboardManager
          import android.content.Context
          import android.content.Intent
          import android.content.SharedPreferences
          import android.graphics.Bitmap
          import android.inputmethodservice.InputMethodService
          import android.net.Uri
          import android.os.*
          import android.util.Log
          import android.util.TypedValue
          import android.view.*
          import android.view.animation.AnimationUtils
          import android.view.inputmethod.EditorInfo
          import android.view.inputmethod.InputConnection
          import android.widget.*
          import androidx.core.content.FileProvider
          import androidx.core.view.inputmethod.EditorInfoCompat
          import androidx.core.view.inputmethod.InputConnectionCompat
          import androidx.core.view.inputmethod.InputContentInfoCompat
          import androidx.recyclerview.widget.GridLayoutManager
          import androidx.recyclerview.widget.RecyclerView
          import java.io.File
          import java.io.FileOutputStream

          class NestorKeyboardService : InputMethodService() {

              companion object {
                  private const val TAG = "NestorKB"
              }

              private enum class Page { QWERTY, EMOJI, NUMBERS, SYMBOLS }
              private enum class ShiftState { OFF, ON, LOCKED }

              private var currentPage = Page.QWERTY
              private var currentLang = KeyboardLayoutManager.Lang.EN
              private var shiftState = ShiftState.OFF
              private var emojis = listOf<EmojiItem>()
              private lateinit var prefs: SharedPreferences
              private var vibrator: Vibrator? = null

              private lateinit var rootView: View
              private lateinit var container: FrameLayout
              private lateinit var tabQwerty: TextView
              private lateinit var tabEmoji: TextView
              private lateinit var tabNumbers: TextView
              private lateinit var tabSymbols: TextView

              // Backspace repeat
              private val handler = Handler(Looper.getMainLooper())
              private var isBackspacePressed = false
              private val backspaceRepeat = object : Runnable {
                  override fun run() {
                      if (isBackspacePressed) {
                          currentInputConnection?.deleteSurroundingText(1, 0)
                          vibrate()
                          handler.postDelayed(this, 50)
                      }
                  }
              }

              override fun onCreate() {
                  super.onCreate()
                  prefs = getSharedPreferences("nestor_kb", Context.MODE_PRIVATE)
                  vibrator = getSystemService(Context.VIBRATOR_SERVICE) as? Vibrator
              }

              override fun onCreateInputView(): View {
                  rootView = layoutInflater.inflate(R.layout.keyboard_main, null)
                  container = rootView.findViewById(R.id.keyboardContainer)
                  tabQwerty = rootView.findViewById(R.id.tabQwerty)
                  tabEmoji = rootView.findViewById(R.id.tabEmoji)
                  tabNumbers = rootView.findViewById(R.id.tabNumbers)
                  tabSymbols = rootView.findViewById(R.id.tabSymbols)

                  emojis = EmojiLoader.loadAll(this)

                  tabQwerty.setOnClickListener { switchPage(Page.QWERTY) }
                  tabEmoji.setOnClickListener { switchPage(Page.EMOJI) }
                  tabNumbers.setOnClickListener { switchPage(Page.NUMBERS) }
                  tabSymbols.setOnClickListener { switchPage(Page.SYMBOLS) }

                  switchPage(Page.QWERTY)
                  return rootView
              }

              // ═══════════════════════════════════
              // PAGE SWITCHING
              // ═══════════════════════════════════
              private fun switchPage(page: Page) {
                  currentPage = page
                  container.removeAllViews()
                  updateTabs()
                  when (page) {
                      Page.QWERTY -> showQwerty()
                      Page.EMOJI -> showEmoji()
                      Page.NUMBERS -> showNumbers()
                      Page.SYMBOLS -> showSymbols()
                  }
              }

              private fun updateTabs() {
                  val active = resources.getColor(R.color.tab_active, null)
                  val inactive = resources.getColor(R.color.tab_inactive, null)
                  tabQwerty.setTextColor(if (currentPage == Page.QWERTY) active else inactive)
                  tabEmoji.setTextColor(if (currentPage == Page.EMOJI) active else inactive)
                  tabNumbers.setTextColor(if (currentPage == Page.NUMBERS) active else inactive)
                  tabSymbols.setTextColor(if (currentPage == Page.SYMBOLS) active else inactive)
              }

              // ═══════════════════════════════════
              // QWERTY PAGE
              // ═══════════════════════════════════
              private fun showQwerty() {
                  val view = layoutInflater.inflate(R.layout.keyboard_qwerty, container, false)
                  container.addView(view)

                  val (r1, r2, r3) = KeyboardLayoutManager.getRows(currentLang)
                  val row1 = view.findViewById<LinearLayout>(R.id.row1)
                  val row2 = view.findViewById<LinearLayout>(R.id.row2)
                  val row3 = view.findViewById<LinearLayout>(R.id.row3)

                  populateRow(row1, r1)
                  populateRow(row2, r2)
                  populateRow(row3, r3)

                  // Shift
                  val btnShift = view.findViewById<ImageButton>(R.id.btnShift)
                  updateShiftIcon(btnShift)
                  btnShift.setOnClickListener {
                      shiftState = when (shiftState) {
                          ShiftState.OFF -> ShiftState.ON
                          ShiftState.ON -> ShiftState.LOCKED
                          ShiftState.LOCKED -> ShiftState.OFF
                      }
                      updateShiftIcon(btnShift)
                      refreshQwertyKeys(row1, row2, row3)
                      vibrate()
                  }

                  // Backspace с повтором
                  val btnBack = view.findViewById<ImageButton>(R.id.btnBackspace)
                  btnBack.setOnTouchListener { _, event ->
                      when (event.action) {
                          MotionEvent.ACTION_DOWN -> {
                              isBackspacePressed = true
                              currentInputConnection?.deleteSurroundingText(1, 0)
                              vibrate()
                              handler.postDelayed(backspaceRepeat, 400)
                              true
                          }
                          MotionEvent.ACTION_UP, MotionEvent.ACTION_CANCEL -> {
                              isBackspacePressed = false
                              handler.removeCallbacks(backspaceRepeat)
                              true
                          }
                          else -> false
                      }
                  }

                  // Bottom row
                  view.findViewById<TextView>(R.id.btnSwitchNum).setOnClickListener {
                      switchPage(Page.NUMBERS); vibrate()
                  }
                  view.findViewById<ImageButton>(R.id.btnLang).setOnClickListener {
                      currentLang = if (currentLang == KeyboardLayoutManager.Lang.EN)
                          KeyboardLayoutManager.Lang.RU else KeyboardLayoutManager.Lang.EN
                      switchPage(Page.QWERTY); vibrate()
                  }
                  view.findViewById<ImageButton>(R.id.btnEmojiToggle).setOnClickListener {
                      switchPage(Page.EMOJI); vibrate()
                  }
                  view.findViewById<TextView>(R.id.btnSpace).apply {
                      text = if (currentLang == KeyboardLayoutManager.Lang.EN) "English" else "Русский"
                      setOnClickListener { commitChar(" "); vibrate() }
                      setOnLongClickListener {
                          currentLang = if (currentLang == KeyboardLayoutManager.Lang.EN)
                              KeyboardLayoutManager.Lang.RU else KeyboardLayoutManager.Lang.EN
                          switchPage(Page.QWERTY); vibrate(); true
                      }
                  }
                  view.findViewById<TextView>(R.id.btnDot).setOnClickListener {
                      commitChar("."); vibrate()
                  }
                  view.findViewById<ImageButton>(R.id.btnEnter).setOnClickListener {
                      val ic = currentInputConnection ?: return@setOnClickListener
                      val ei = currentInputEditorInfo
                      val action = ei?.imeOptions?.and(EditorInfo.IME_MASK_ACTION)
                          ?: EditorInfo.IME_ACTION_UNSPECIFIED
                      if (action == EditorInfo.IME_ACTION_NONE || action == EditorInfo.IME_ACTION_UNSPECIFIED) {
                          ic.commitText("\n", 1)
                      } else {
                          ic.performEditorAction(action)
                      }
                      vibrate()
                  }
              }

              private fun populateRow(row: LinearLayout, keys: List<String>) {
                  row.removeAllViews()
                  keys.forEach { key ->
                      val btn = TextView(this).apply {
                          text = applyShift(key)
                          setTextColor(resources.getColor(R.color.key_text, null))
                          setTextSize(TypedValue.COMPLEX_UNIT_PX,
                              resources.getDimension(R.dimen.key_text_size))
                          gravity = Gravity.CENTER
                          setBackgroundResource(R.drawable.key_bg)
                          layoutParams = LinearLayout.LayoutParams(
                              0, LinearLayout.LayoutParams.MATCH_PARENT, 1f
                          ).apply {
                              val m = resources.getDimensionPixelSize(R.dimen.key_margin)
                              setMargins(m, m, m, m)
                          }
                          isClickable = true
                          isFocusable = true
                      }
                      btn.setOnClickListener {
                          commitChar(btn.text.toString())
                          vibrate()
                          animateKey(btn)
                          if (shiftState == ShiftState.ON) {
                              shiftState = ShiftState.OFF
                              showQwerty()
                          }
                      }
                      row.addView(btn)
                  }
              }

              private fun refreshQwertyKeys(r1: LinearLayout, r2: LinearLayout, r3: LinearLayout) {
                  refreshRow(r1); refreshRow(r2); refreshRow(r3)
              }

              private fun refreshRow(row: LinearLayout) {
                  for (i in 0 until row.childCount) {
                      val v = row.getChildAt(i)
                      if (v is TextView) {
                          v.text = applyShift(v.text.toString())
                      }
                  }
              }

              private fun applyShift(key: String): String {
                  return if (shiftState != ShiftState.OFF) key.uppercase() else key.lowercase()
              }

              private fun updateShiftIcon(btn: ImageButton) {
                  btn.setImageResource(when (shiftState) {
                      ShiftState.OFF -> R.drawable.ic_shift
                      ShiftState.ON -> R.drawable.ic_shift
                      ShiftState.LOCKED -> R.drawable.ic_shift_locked
                  })
              }

              // ═══════════════════════════════════
              // NUMBERS PAGE
              // ═══════════════════════════════════
              private fun showNumbers() {
                  val view = layoutInflater.inflate(R.layout.keyboard_numbers, container, false)
                  container.addView(view)
                  populateRow(view.findViewById(R.id.numRow1), KeyboardLayoutManager.NUM_ROW1)
                  populateRow(view.findViewById(R.id.numRow2), KeyboardLayoutManager.NUM_ROW2)
                  populateRow(view.findViewById(R.id.numRow3), KeyboardLayoutManager.NUM_ROW3)

                  val row4 = view.findViewById<LinearLayout>(R.id.numRow4)
                  // ABC button
                  addSpecialKey(row4, "ABC", 1.5f) { switchPage(Page.QWERTY); vibrate() }
                  // Symbols
                  addSpecialKey(row4, "#+=", 1.5f) { switchPage(Page.SYMBOLS); vibrate() }
                  // Space
                  val spaceBtn = TextView(this).apply {
                      text = " "; gravity = Gravity.CENTER
                      setBackgroundResource(R.drawable.key_bg_space)
                      layoutParams = LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.MATCH_PARENT, 5f).apply {
                          val m = resources.getDimensionPixelSize(R.dimen.key_margin); setMargins(m,m,m,m) }
                      setOnClickListener { commitChar(" "); vibrate() }
                  }
                  row4.addView(spaceBtn)
                  addSpecialKey(row4, ".", 1f) { commitChar("."); vibrate() }
                  // Backspace
                  val bs = ImageButton(this).apply {
                      setImageResource(R.drawable.ic_backspace); scaleType = ImageView.ScaleType.CENTER_INSIDE
                      setBackgroundResource(R.drawable.key_bg_special)
                      layoutParams = LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.MATCH_PARENT, 1.5f).apply {
                          val m = resources.getDimensionPixelSize(R.dimen.key_margin); setMargins(m,m,m,m) }
                  }
                  bs.setOnTouchListener { _, event ->
                      when (event.action) {
                          MotionEvent.ACTION_DOWN -> {
                              isBackspacePressed = true; currentInputConnection?.deleteSurroundingText(1,0)
                              vibrate(); handler.postDelayed(backspaceRepeat, 400); true
                          }
                          MotionEvent.ACTION_UP, MotionEvent.ACTION_CANCEL -> {
                              isBackspacePressed = false; handler.removeCallbacks(backspaceRepeat); true
                          }
                          else -> false
                      }
                  }
                  row4.addView(bs)
              }

              // ═══════════════════════════════════
              // SYMBOLS PAGE
              // ═══════════════════════════════════
              private fun showSymbols() {
                  val view = layoutInflater.inflate(R.layout.keyboard_numbers, container, false)
                  container.addView(view)
                  populateRow(view.findViewById(R.id.numRow1), KeyboardLayoutManager.SYM_ROW1)
                  populateRow(view.findViewById(R.id.numRow2), KeyboardLayoutManager.SYM_ROW2)
                  populateRow(view.findViewById(R.id.numRow3), KeyboardLayoutManager.SYM_ROW3)

                  val row4 = view.findViewById<LinearLayout>(R.id.numRow4)
                  addSpecialKey(row4, "ABC", 1.5f) { switchPage(Page.QWERTY); vibrate() }
                  addSpecialKey(row4, "123", 1.5f) { switchPage(Page.NUMBERS); vibrate() }
                  val sp = TextView(this).apply {
                      text = " "; setBackgroundResource(R.drawable.key_bg_space)
                      layoutParams = LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.MATCH_PARENT, 5f).apply {
                          val m = resources.getDimensionPixelSize(R.dimen.key_margin); setMargins(m,m,m,m) }
                      setOnClickListener { commitChar(" "); vibrate() }
                  }
                  row4.addView(sp)
                  addSpecialKey(row4, ".", 1f) { commitChar("."); vibrate() }
                  val bs = ImageButton(this).apply {
                      setImageResource(R.drawable.ic_backspace); scaleType = ImageView.ScaleType.CENTER_INSIDE
                      setBackgroundResource(R.drawable.key_bg_special)
                      layoutParams = LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.MATCH_PARENT, 1.5f).apply {
                          val m = resources.getDimensionPixelSize(R.dimen.key_margin); setMargins(m,m,m,m) }
                  }
                  bs.setOnTouchListener { _, event ->
                      when (event.action) {
                          MotionEvent.ACTION_DOWN -> {
                              isBackspacePressed = true; currentInputConnection?.deleteSurroundingText(1,0)
                              vibrate(); handler.postDelayed(backspaceRepeat, 400); true
                          }
                          MotionEvent.ACTION_UP, MotionEvent.ACTION_CANCEL -> {
                              isBackspacePressed = false; handler.removeCallbacks(backspaceRepeat); true
                          }
                          else -> false
                      }
                  }
                  row4.addView(bs)
              }

              private fun addSpecialKey(row: LinearLayout, text: String, weight: Float, action: () -> Unit) {
                  val btn = TextView(this).apply {
                      this.text = text; gravity = Gravity.CENTER
                      setTextColor(resources.getColor(R.color.key_text_special, null))
                      textSize = 15f; setBackgroundResource(R.drawable.key_bg_special)
                      layoutParams = LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.MATCH_PARENT, weight).apply {
                          val m = resources.getDimensionPixelSize(R.dimen.key_margin); setMargins(m,m,m,m) }
                      setOnClickListener { action() }
                  }
                  row.addView(btn)
              }

              // ═══════════════════════════════════
              // EMOJI PAGE
              // ═══════════════════════════════════
              private fun showEmoji() {
                  val view = layoutInflater.inflate(R.layout.keyboard_emoji, container, false)
                  container.addView(view)

                  val tvMode = view.findViewById<TextView>(R.id.tvEmojiMode)
                  tvMode.text = "Sticker mode • ${emojis.size} emoji"

                  val rv = view.findViewById<RecyclerView>(R.id.rvEmoji)
                  rv.layoutManager = GridLayoutManager(this, 5)
                  rv.adapter = EmojiAdapter(emojis,
                      onClick = { sendEmoji(it) },
                      onLongClick = { copyToClipboard(it) }
                  )

                  view.findViewById<ImageButton>(R.id.btnEmojiBackspace).apply {
                      setOnTouchListener { _, event ->
                          when (event.action) {
                              MotionEvent.ACTION_DOWN -> {
                                  isBackspacePressed = true; currentInputConnection?.deleteSurroundingText(1,0)
                                  vibrate(); handler.postDelayed(backspaceRepeat, 400); true
                              }
                              MotionEvent.ACTION_UP, MotionEvent.ACTION_CANCEL -> {
                                  isBackspacePressed = false; handler.removeCallbacks(backspaceRepeat); true
                              }
                              else -> false
                          }
                      }
                  }
              }

              // ═══════════════════════════════════
              // EMOJI SENDING
              // ═══════════════════════════════════
              private fun sendEmoji(emoji: EmojiItem) {
                  val ic = currentInputConnection ?: return
                  val ei = currentInputEditorInfo ?: return

                  val mimeTypes = EditorInfoCompat.getContentMimeTypes(ei)
                  val supportsImage = mimeTypes.any {
                      ClipDescription.compareMimeTypes(it, "image/png") ||
                      ClipDescription.compareMimeTypes(it, "image/*")
                  }

                  if (supportsImage) {
                      val sent = commitImage(emoji, ic, ei)
                      if (sent) { vibrate(); return }
                  }
                  copyToClipboard(emoji)
              }

              private fun commitImage(emoji: EmojiItem, ic: InputConnection, ei: EditorInfo): Boolean {
                  return try {
                      val file = getEmojiFile(emoji)
                      val uri = FileProvider.getUriForFile(this, "$packageName.fileprovider", file)
                      val desc = ClipDescription(emoji.name, arrayOf("image/png"))
                      val info = InputContentInfoCompat(uri, desc, null)
                      InputConnectionCompat.commitContent(ic, ei, info,
                          InputConnectionCompat.INPUT_CONTENT_GRANT_READ_URI_PERMISSION, null)
                  } catch (e: Exception) { Log.e(TAG, "commitImage fail", e); false }
              }

              private fun copyToClipboard(emoji: EmojiItem) {
                  try {
                      val file = getEmojiFile(emoji)
                      val uri = FileProvider.getUriForFile(this, "$packageName.fileprovider", file)
                      grantUriPermission("*", uri, Intent.FLAG_GRANT_READ_URI_PERMISSION)
                      val clip = ClipData.newUri(contentResolver, emoji.name, uri)
                      (getSystemService(CLIPBOARD_SERVICE) as ClipboardManager).setPrimaryClip(clip)
                      Toast.makeText(this, "${emoji.name} copied", Toast.LENGTH_SHORT).show()
                      vibrate()
                  } catch (e: Exception) { Log.e(TAG, "clipboard fail", e) }
              }

              private fun getEmojiFile(emoji: EmojiItem): File {
                  val dir = File(cacheDir, "emoji"); dir.mkdirs()
                  val file = File(dir, emoji.fileName)
                  if (!file.exists() || file.length() == 0L)
                      FileOutputStream(file).use { emoji.bitmap?.compress(Bitmap.CompressFormat.PNG, 100, it) }
                  return file
              }

              // ═══════════════════════════════════
              // UTILITIES
              // ═══════════════════════════════════
              private fun commitChar(c: String) {
                  currentInputConnection?.commitText(c, 1)
              }

              private fun vibrate() {
                  if (prefs.getBoolean("vibrate", true)) {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O)
                          vibrator?.vibrate(VibrationEffect.createOneShot(20, VibrationEffect.DEFAULT_AMPLITUDE))
                      else @Suppress("DEPRECATION") vibrator?.vibrate(20)
                  }
              }

              private fun animateKey(view: View) {
                  try { view.startAnimation(AnimationUtils.loadAnimation(this, R.anim.key_press)) }
                  catch (_: Exception) {}
              }

              override fun onDestroy() {
                  super.onDestroy()
                  handler.removeCallbacks(backspaceRepeat)
              }
          }
          KOTLIN_EOF

          # ══════════════════════════════════════
          # SettingsActivity.kt
          # ══════════════════════════════════════
          cat > "$K/SettingsActivity.kt" << 'EOF'
          package com.custom.keyboard
          import android.content.Intent; import android.os.Bundle; import android.provider.Settings
          import android.widget.*; import androidx.appcompat.app.AppCompatActivity
          import androidx.recyclerview.widget.GridLayoutManager; import androidx.recyclerview.widget.RecyclerView
          class SettingsActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState); setContentView(R.layout.activity_settings)
                  val emojis = EmojiLoader.loadAll(this)
                  findViewById<TextView>(R.id.tvInfo).text =
                      if (emojis.isEmpty()) getString(R.string.no_emoji)
                      else "${getString(R.string.emoji_count, emojis.size)}\n\nTap = send as sticker\nLong press = copy to clipboard"
                  val rv = findViewById<RecyclerView>(R.id.rvPreview)
                  rv.layoutManager = GridLayoutManager(this, 5)
                  rv.adapter = EmojiAdapter(emojis,
                      { Toast.makeText(this, it.name, Toast.LENGTH_SHORT).show() },
                      { Toast.makeText(this, "Long: ${it.name}", Toast.LENGTH_SHORT).show() })
                  findViewById<Button>(R.id.btnSettings).setOnClickListener {
                      startActivity(Intent(Settings.ACTION_INPUT_METHOD_SETTINGS)) }
              }
          }
          EOF

          echo "✅ All Kotlin code created"

      - name: Copy emoji and generate catalog
        run: |
          ASSETS="app/src/main/assets/emoji"
          DRAWABLE="app/src/main/res/drawable-nodpi"
          count=0
          for f in emoji/*; do
            [ ! -f "$f" ] && continue
            ext=$(echo "${f##*.}" | tr '[:upper:]' '[:lower:]')
            [ "$ext" != "png" ] && continue
            M=$(xxd -l 4 -p "$f" 2>/dev/null)
            [ "$M" != "89504e47" ] && continue
            fn=$(basename "$f")
            safe=$(echo "${fn%.*}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_]/_/g;s/__*/_/g;s/^_//;s/_$//')
            [[ ! "$safe" =~ ^[a-z] ]] && safe="emoji_${safe}"
            cp "$f" "$DRAWABLE/${safe}.png"
            cp "$f" "$ASSETS/${safe}.png"
            count=$((count+1))
          done
          echo "Copied: $count PNG"

          # Catalog
          CAT="$ASSETS/catalog.json"
          echo "[" > "$CAT"; first=true
          for f in "$ASSETS"/*.png; do
            [ ! -f "$f" ] && continue; fn=$(basename "$f")
            [ "$first" = true ] && first=false || echo "," >> "$CAT"
            printf '  {"name":"%s","file":"%s"}' "${fn%.png}" "$fn" >> "$CAT"
          done
          echo -e "\n]" >> "$CAT"
          cat "$CAT"

      - name: Install Gradle Wrapper
        run: |
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/g.zip
          unzip -q /tmp/g.zip -d /tmp/
          /tmp/gradle-8.5/bin/gradle wrapper --gradle-version 8.5 --no-daemon
          rm -rf /tmp/gradle* /tmp/g.zip
          chmod +x gradlew && ./gradlew --version

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:+UseParallelGC"

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        continue-on-error: true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NestorKeyboard-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 90
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: NestorKeyboard-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: warn

      - name: Summary
        if: always()
        run: |
          echo "## 🎹 Nestor Keyboard Build" >> $GITHUB_STEP_SUMMARY
          ec=$(ls app/src/main/assets/emoji/*.png 2>/dev/null | wc -l)
          echo "### 😀 Emoji: ${ec}" >> $GITHUB_STEP_SUMMARY
          echo "### 🎹 Features:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ QWERTY (EN/RU)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Numbers & Symbols" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Custom Emoji Stickers" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Shift / Caps Lock" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Backspace with repeat" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Haptic feedback" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Key animations" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Language switch (EN↔RU)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dark theme" >> $GITHUB_STEP_SUMMARY
          for apk in app/build/outputs/apk/debug/*.apk; do
            [ -f "$apk" ] && echo "- 📦 **Debug:** \`$(basename $apk)\` ($(du -h "$apk"|cut -f1))" >> $GITHUB_STEP_SUMMARY
          done
