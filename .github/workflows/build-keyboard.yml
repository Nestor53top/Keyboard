name: Build Android Keyboard APK

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  build:
    name: Build Keyboard APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: Nestor53top/Keyboard
          ref: main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Validate emoji files
        run: |
          EMOJI_DIR="emoji"
          ERRORS=0
          VALID=0

          if [ ! -d "$EMOJI_DIR" ]; then
            echo "❌ Папка emoji/ не найдена!"
            exit 1
          fi

          for file in "$EMOJI_DIR"/*; do
            [ ! -f "$file" ] && continue
            filename=$(basename "$file")
            ext="${filename##*.}"
            ext_lower=$(echo "$ext" | tr '[:upper:]' '[:lower:]')

            if [ "$ext_lower" != "png" ]; then
              echo "❌ ОТКЛОНЁН: $filename (не PNG)"
              ERRORS=$((ERRORS + 1))
              rm "$file"
              continue
            fi

            MAGIC=$(xxd -l 4 -p "$file" 2>/dev/null)
            if [ "$MAGIC" != "89504e47" ]; then
              echo "❌ ОТКЛОНЁН: $filename (повреждён)"
              ERRORS=$((ERRORS + 1))
              rm "$file"
              continue
            fi

            echo "  ✅ $filename"
            VALID=$((VALID + 1))
          done

          echo "Валидных: $VALID | Отклонённых: $ERRORS"
          [ "$VALID" -eq 0 ] && exit 1 || true

      - name: Create Android project
        run: |
          mkdir -p app/src/main/java/com/custom/keyboard
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/drawable-nodpi
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/assets/emoji
          mkdir -p gradle/wrapper

          # ── settings.gradle.kts ──
          cat > settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "CustomEmojiKeyboard"
          include(":app")
          EOF

          # ── build.gradle.kts (root) ──
          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.2.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.21" apply false
          }
          EOF

          # ── gradle.properties ──
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          org.gradle.caching=true
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          EOF

          # ── gradle-wrapper.properties ──
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # ── app/build.gradle.kts ──
          cat > app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.custom.keyboard"
              compileSdk = 34

              defaultConfig {
                  applicationId = "com.custom.keyboard"
                  minSdk = 24
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0.0"
              }

              buildTypes {
                  debug { isMinifyEnabled = false }
                  release { isMinifyEnabled = false }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions { jvmTarget = "17" }
              aaptOptions { noCompress += listOf("png") }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.appcompat:appcompat:1.6.1")
              implementation("com.google.android.material:material:1.11.0")
              implementation("androidx.recyclerview:recyclerview:1.3.2")
              implementation("androidx.constraintlayout:constraintlayout:2.1.4")
          }
          EOF

          # ══════════════════════════════════════════════
          # AndroidManifest.xml — С FileProvider ДЛЯ КАРТИНОК
          # ══════════════════════════════════════════════
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_keyboard"
                  android:label="@string/app_name"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.MaterialComponents.Light.NoActionBar">

                  <activity
                      android:name=".SettingsActivity"
                      android:exported="true"
                      android:label="@string/app_name">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <service
                      android:name=".EmojiKeyboardService"
                      android:exported="true"
                      android:label="@string/keyboard_name"
                      android:permission="android.permission.BIND_INPUT_METHOD">
                      <intent-filter>
                          <action android:name="android.view.InputMethod" />
                      </intent-filter>
                      <meta-data
                          android:name="android.view.im"
                          android:resource="@xml/method" />
                  </service>

                  <!-- FileProvider для отправки картинок в другие приложения -->
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>
              </application>
          </manifest>
          EOF

          # ── res/xml/method.xml ──
          cat > app/src/main/res/xml/method.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <input-method
              xmlns:android="http://schemas.android.com/apk/res/android"
              android:settingsActivity="com.custom.keyboard.SettingsActivity"
              android:isDefault="false">
              <subtype
                  android:imeSubtypeMode="keyboard"
                  android:label="Emoji Keyboard"
                  android:imeSubtypeLocale="en_US" />
          </input-method>
          EOF

          # ══════════════════════════════════════════════
          # res/xml/file_paths.xml — ПУТИ ДЛЯ FileProvider
          # ══════════════════════════════════════════════
          cat > app/src/main/res/xml/file_paths.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <cache-path name="emoji_images" path="emoji/" />
          </paths>
          EOF

          # ── res/values/strings.xml ──
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Custom Emoji Keyboard</string>
              <string name="keyboard_name">Emoji Keyboard</string>
              <string name="enable_hint">Enable in Settings → System → Languages → On-screen keyboard</string>
              <string name="emoji_count">Custom emoji: %d</string>
              <string name="no_emoji">No emoji found</string>
          </resources>
          EOF

          # ── res/values/colors.xml ──
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="keyboard_bg">#FF1B1B2F</color>
              <color name="key_bg">#FF162447</color>
              <color name="key_pressed">#FF1F4068</color>
              <color name="key_text">#FFFFFFFF</color>
              <color name="accent">#FFE43F5A</color>
              <color name="divider">#33FFFFFF</color>
          </resources>
          EOF

          # ── res/values/dimens.xml ──
          cat > app/src/main/res/values/dimens.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <dimen name="keyboard_height">280dp</dimen>
              <dimen name="emoji_size">40dp</dimen>
              <dimen name="emoji_padding">6dp</dimen>
              <dimen name="grid_spacing">4dp</dimen>
          </resources>
          EOF

          # ── res/drawable/ic_keyboard.xml ──
          cat > app/src/main/res/drawable/ic_keyboard.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="48dp"
              android:height="48dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="#FFE43F5A"
                  android:pathData="M20,5H4C2.9,5 2,5.9 2,7v10c0,1.1 0.9,2 2,2h16c1.1,0 2,-0.9 2,-2V7C22,5.9 21.1,5 20,5zM11,8h2v2h-2V8zM11,11h2v2h-2V11zM8,8h2v2H8V8zM8,11h2v2H8V11zM7,13H5v-2h2V13zM7,10H5V8h2V10zM16,17H8v-2h8V17zM16,13h-2v-2h2V13zM16,10h-2V8h2V10zM19,13h-2v-2h2V13zM19,10h-2V8h2V10z"/>
          </vector>
          EOF

          # ── res/drawable/emoji_item_bg.xml ──
          cat > app/src/main/res/drawable/emoji_item_bg.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ripple xmlns:android="http://schemas.android.com/apk/res/android"
              android:color="@color/key_pressed">
              <item>
                  <shape android:shape="rectangle">
                      <corners android:radius="8dp" />
                      <solid android:color="@color/key_bg" />
                  </shape>
              </item>
          </ripple>
          EOF

          # ── res/layout/keyboard_view.xml ──
          cat > app/src/main/res/layout/keyboard_view.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="@dimen/keyboard_height"
              android:orientation="vertical"
              android:background="@color/keyboard_bg">

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="40dp"
                  android:orientation="horizontal"
                  android:gravity="center_vertical"
                  android:paddingStart="8dp"
                  android:paddingEnd="8dp"
                  android:background="@color/key_bg">

                  <TextView
                      android:id="@+id/tvCount"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:textColor="@color/key_text"
                      android:textSize="12sp" />

                  <ImageButton
                      android:id="@+id/btnBackspace"
                      android:layout_width="48dp"
                      android:layout_height="36dp"
                      android:background="@drawable/emoji_item_bg"
                      android:src="@android:drawable/ic_input_delete"
                      android:contentDescription="Backspace"
                      android:scaleType="centerInside" />
              </LinearLayout>

              <View
                  android:layout_width="match_parent"
                  android:layout_height="1dp"
                  android:background="@color/divider" />

              <androidx.recyclerview.widget.RecyclerView
                  android:id="@+id/rvEmoji"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:padding="@dimen/grid_spacing"
                  android:clipToPadding="false" />
          </LinearLayout>
          EOF

          # ── res/layout/item_emoji.xml ──
          cat > app/src/main/res/layout/item_emoji.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="wrap_content"
              android:background="@drawable/emoji_item_bg"
              android:padding="@dimen/emoji_padding">
              <ImageView
                  android:id="@+id/ivEmoji"
                  android:layout_width="@dimen/emoji_size"
                  android:layout_height="@dimen/emoji_size"
                  android:layout_gravity="center"
                  android:scaleType="fitCenter"
                  android:contentDescription="emoji" />
          </FrameLayout>
          EOF

          # ── res/layout/activity_settings.xml ──
          cat > app/src/main/res/layout/activity_settings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:gravity="center"
              android:padding="32dp"
              android:background="@color/keyboard_bg">

              <ImageView
                  android:layout_width="80dp"
                  android:layout_height="80dp"
                  android:src="@drawable/ic_keyboard"
                  android:layout_marginBottom="24dp"
                  android:contentDescription="icon" />

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="@string/app_name"
                  android:textSize="24sp"
                  android:textColor="@color/key_text"
                  android:textStyle="bold"
                  android:layout_marginBottom="16dp" />

              <TextView
                  android:id="@+id/tvInfo"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:textSize="16sp"
                  android:textColor="@color/key_text"
                  android:layout_marginBottom="24dp"
                  android:gravity="center" />

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="@string/enable_hint"
                  android:textSize="14sp"
                  android:textColor="#99FFFFFF"
                  android:gravity="center"
                  android:layout_marginBottom="24dp" />

              <Button
                  android:id="@+id/btnSettings"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Open Keyboard Settings"
                  android:backgroundTint="@color/accent" />

              <androidx.recyclerview.widget.RecyclerView
                  android:id="@+id/rvPreview"
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_weight="1"
                  android:layout_marginTop="24dp" />
          </LinearLayout>
          EOF

          echo "✅ Ресурсы созданы"

      # ══════════════════════════════════════════════════════
      # ШАГ 5: KOTLIN КОД — ГЛАВНОЕ ИСПРАВЛЕНИЕ
      # ══════════════════════════════════════════════════════
      - name: Create Kotlin source code
        run: |
          K="app/src/main/java/com/custom/keyboard"

          # ── EmojiItem.kt ──
          cat > "$K/EmojiItem.kt" << 'EOF'
          package com.custom.keyboard

          import android.graphics.Bitmap

          data class EmojiItem(
              val name: String,
              val fileName: String,
              val bitmap: Bitmap?
          )
          EOF

          # ── EmojiLoader.kt ──
          cat > "$K/EmojiLoader.kt" << 'EOF'
          package com.custom.keyboard

          import android.content.Context
          import android.graphics.BitmapFactory
          import android.util.Log
          import org.json.JSONArray

          object EmojiLoader {
              private const val TAG = "EmojiLoader"
              private const val DIR = "emoji"
              private const val CATALOG = "emoji/catalog.json"

              fun loadAll(ctx: Context): List<EmojiItem> {
                  val list = mutableListOf<EmojiItem>()
                  try {
                      val json = ctx.assets.open(CATALOG)
                          .bufferedReader().use { it.readText() }
                      val arr = JSONArray(json)
                      for (i in 0 until arr.length()) {
                          val obj = arr.getJSONObject(i)
                          val name = obj.getString("name")
                          val file = obj.getString("file")
                          if (!file.lowercase().endsWith(".png")) continue
                          val bmp = try {
                              ctx.assets.open("$DIR/$file").use {
                                  BitmapFactory.decodeStream(it)
                              }
                          } catch (e: Exception) { null }
                          if (bmp != null) list.add(EmojiItem(name, file, bmp))
                      }
                  } catch (e: Exception) {
                      Log.e(TAG, "Catalog failed", e)
                      try {
                          val files = ctx.assets.list(DIR) ?: emptyArray()
                          for (f in files.sorted()) {
                              if (f == "catalog.json") continue
                              if (!f.lowercase().endsWith(".png")) continue
                              val bmp = try {
                                  ctx.assets.open("$DIR/$f").use {
                                      BitmapFactory.decodeStream(it)
                                  }
                              } catch (ex: Exception) { null }
                              if (bmp != null) list.add(
                                  EmojiItem(f.substringBeforeLast("."), f, bmp)
                              )
                          }
                      } catch (ex: Exception) {
                          Log.e(TAG, "Scan failed", ex)
                      }
                  }
                  Log.i(TAG, "Loaded ${list.size} emoji")
                  return list
              }
          }
          EOF

          # ── EmojiAdapter.kt ──
          cat > "$K/EmojiAdapter.kt" << 'EOF'
          package com.custom.keyboard

          import android.view.LayoutInflater
          import android.view.View
          import android.view.ViewGroup
          import android.widget.ImageView
          import androidx.recyclerview.widget.RecyclerView

          class EmojiAdapter(
              private val items: List<EmojiItem>,
              private val onClick: (EmojiItem) -> Unit
          ) : RecyclerView.Adapter<EmojiAdapter.VH>() {

              class VH(v: View) : RecyclerView.ViewHolder(v) {
                  val iv: ImageView = v.findViewById(R.id.ivEmoji)
              }

              override fun onCreateViewHolder(p: ViewGroup, t: Int) =
                  VH(LayoutInflater.from(p.context)
                      .inflate(R.layout.item_emoji, p, false))

              override fun onBindViewHolder(h: VH, pos: Int) {
                  val e = items[pos]
                  h.iv.setImageBitmap(e.bitmap)
                  h.iv.contentDescription = e.name
                  h.itemView.setOnClickListener { onClick(e) }
              }

              override fun getItemCount() = items.size
          }
          EOF

          # ══════════════════════════════════════════════
          # EmojiKeyboardService.kt — ОТПРАВКА КАРТИНОК
          # ══════════════════════════════════════════════
          cat > "$K/EmojiKeyboardService.kt" << 'KOTLIN_EOF'
          package com.custom.keyboard

          import android.content.ClipDescription
          import android.graphics.Bitmap
          import android.inputmethodservice.InputMethodService
          import android.net.Uri
          import android.util.Log
          import android.view.View
          import android.view.inputmethod.EditorInfo
          import android.view.inputmethod.InputConnection
          import android.widget.ImageButton
          import android.widget.TextView
          import android.widget.Toast
          import androidx.core.content.FileProvider
          import androidx.core.view.inputmethod.EditorInfoCompat
          import androidx.core.view.inputmethod.InputConnectionCompat
          import androidx.core.view.inputmethod.InputContentInfoCompat
          import androidx.recyclerview.widget.GridLayoutManager
          import androidx.recyclerview.widget.RecyclerView
          import java.io.File
          import java.io.FileOutputStream

          class EmojiKeyboardService : InputMethodService() {

              companion object {
                  private const val TAG = "EmojiKeyboard"
                  private const val MIME_PNG = "image/png"
                  private const val AUTHORITY_SUFFIX = ".fileprovider"
              }

              private lateinit var emojis: List<EmojiItem>

              override fun onCreateInputView(): View {
                  val view = layoutInflater.inflate(R.layout.keyboard_view, null)
                  emojis = EmojiLoader.loadAll(this)

                  view.findViewById<TextView>(R.id.tvCount).text =
                      getString(R.string.emoji_count, emojis.size)

                  val rv = view.findViewById<RecyclerView>(R.id.rvEmoji)
                  rv.layoutManager = GridLayoutManager(this, 6)
                  rv.adapter = EmojiAdapter(emojis) { emoji ->
                      sendEmoji(emoji)
                  }

                  view.findViewById<ImageButton>(R.id.btnBackspace).apply {
                      setOnClickListener {
                          currentInputConnection?.deleteSurroundingText(1, 0)
                      }
                      setOnLongClickListener {
                          currentInputConnection?.deleteSurroundingText(50, 0)
                          true
                      }
                  }

                  return view
              }

              private fun sendEmoji(emoji: EmojiItem) {
                  val ic = currentInputConnection ?: return
                  val ei = currentInputEditorInfo ?: return

                  // Проверяем поддерживает ли приложение приём картинок
                  val mimeTypes = EditorInfoCompat.getContentMimeTypes(ei)
                  val supportsImage = mimeTypes.any {
                      ClipDescription.compareMimeTypes(it, MIME_PNG) ||
                      ClipDescription.compareMimeTypes(it, "image/*")
                  }

                  if (supportsImage) {
                      // ── ПУТЬ 1: Отправка как картинка (Telegram, WhatsApp и др.) ──
                      val sent = commitEmojiImage(emoji, ic, ei)
                      if (sent) {
                          Log.i(TAG, "Sent image: ${emoji.name}")
                          return
                      }
                  }

                  // ── ПУТЬ 2: Копирование в буфер обмена как картинка ──
                  val copied = copyImageToClipboard(emoji)
                  if (copied) {
                      Toast.makeText(
                          this,
                          "${emoji.name} скопирован — вставьте из буфера",
                          Toast.LENGTH_SHORT
                      ).show()
                  }
              }

              /**
               * Отправляет эмодзи как изображение через Commit Content API
               * Работает в Telegram, WhatsApp, Signal, Discord и др.
               */
              private fun commitEmojiImage(
                  emoji: EmojiItem,
                  ic: InputConnection,
                  ei: EditorInfo
              ): Boolean {
                  return try {
                      // 1. Сохраняем PNG в кэш
                      val emojiDir = File(cacheDir, "emoji")
                      emojiDir.mkdirs()
                      val file = File(emojiDir, emoji.fileName)

                      if (!file.exists() || file.length() == 0L) {
                          FileOutputStream(file).use { out ->
                              emoji.bitmap?.compress(
                                  Bitmap.CompressFormat.PNG, 100, out
                              )
                          }
                      }

                      // 2. Получаем content:// URI через FileProvider
                      val authority = "$packageName$AUTHORITY_SUFFIX"
                      val contentUri: Uri = FileProvider.getUriForFile(
                          this, authority, file
                      )

                      // 3. Создаём описание контента
                      val description = ClipDescription(emoji.name, arrayOf(MIME_PNG))
                      val contentInfo = InputContentInfoCompat(
                          contentUri, description, null
                      )

                      // 4. Отправляем в приложение
                      val flags = InputConnectionCompat
                          .INPUT_CONTENT_GRANT_READ_URI_PERMISSION

                      InputConnectionCompat.commitContent(
                          ic, ei, contentInfo, flags, null
                      )
                  } catch (e: Exception) {
                      Log.e(TAG, "commitContent failed: ${emoji.name}", e)
                      false
                  }
              }

              /**
               * Копирует эмодзи в буфер обмена как картинку
               * Запасной вариант для приложений без Commit Content API
               */
              private fun copyImageToClipboard(emoji: EmojiItem): Boolean {
                  return try {
                      val emojiDir = File(cacheDir, "emoji")
                      emojiDir.mkdirs()
                      val file = File(emojiDir, emoji.fileName)

                      if (!file.exists() || file.length() == 0L) {
                          FileOutputStream(file).use { out ->
                              emoji.bitmap?.compress(
                                  Bitmap.CompressFormat.PNG, 100, out
                              )
                          }
                      }

                      val authority = "$packageName$AUTHORITY_SUFFIX"
                      val uri = FileProvider.getUriForFile(this, authority, file)

                      val clipboard = getSystemService(CLIPBOARD_SERVICE)
                          as android.content.ClipboardManager
                      val clip = android.content.ClipData.newUri(
                          contentResolver, emoji.name, uri
                      )
                      clipboard.setPrimaryClip(clip)

                      // Даём разрешение на чтение
                      grantUriPermission(
                          "com.android.systemui",
                          uri,
                          android.content.Intent.FLAG_GRANT_READ_URI_PERMISSION
                      )

                      true
                  } catch (e: Exception) {
                      Log.e(TAG, "Clipboard copy failed: ${emoji.name}", e)
                      false
                  }
              }
          }
          KOTLIN_EOF

          # ── SettingsActivity.kt ──
          cat > "$K/SettingsActivity.kt" << 'EOF'
          package com.custom.keyboard

          import android.content.Intent
          import android.os.Bundle
          import android.provider.Settings
          import android.widget.Button
          import android.widget.TextView
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity
          import androidx.recyclerview.widget.GridLayoutManager
          import androidx.recyclerview.widget.RecyclerView

          class SettingsActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_settings)

                  val emojis = EmojiLoader.loadAll(this)

                  findViewById<TextView>(R.id.tvInfo).text =
                      if (emojis.isEmpty()) getString(R.string.no_emoji)
                      else getString(R.string.emoji_count, emojis.size)

                  val rv = findViewById<RecyclerView>(R.id.rvPreview)
                  rv.layoutManager = GridLayoutManager(this, 5)
                  rv.adapter = EmojiAdapter(emojis) {
                      Toast.makeText(this, it.name, Toast.LENGTH_SHORT).show()
                  }

                  findViewById<Button>(R.id.btnSettings).setOnClickListener {
                      startActivity(Intent(Settings.ACTION_INPUT_METHOD_SETTINGS))
                  }
              }
          }
          EOF

          echo "✅ Kotlin-код создан"

      - name: Copy PNG emoji to resources
        run: |
          EMOJI_SRC="emoji"
          DRAWABLE="app/src/main/res/drawable-nodpi"
          ASSETS="app/src/main/assets/emoji"
          count=0

          for file in "$EMOJI_SRC"/*; do
            [ ! -f "$file" ] && continue
            filename=$(basename "$file")
            ext_lower=$(echo "${filename##*.}" | tr '[:upper:]' '[:lower:]')
            [ "$ext_lower" != "png" ] && continue

            MAGIC=$(xxd -l 4 -p "$file" 2>/dev/null)
            [ "$MAGIC" != "89504e47" ] && continue

            safe=$(echo "${filename%.*}" \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/[^a-z0-9_]/_/g;s/__*/_/g;s/^_//;s/_$//')
            [[ ! "$safe" =~ ^[a-z] ]] && safe="emoji_${safe}"

            cp "$file" "$DRAWABLE/${safe}.png"
            cp "$file" "$ASSETS/${safe}.png"
            echo "  ✅ $filename → ${safe}.png"
            count=$((count + 1))
          done

          echo "PNG скопировано: $count"

      - name: Generate emoji catalog
        run: |
          CATALOG="app/src/main/assets/emoji/catalog.json"
          echo "[" > "$CATALOG"
          first=true

          for file in app/src/main/assets/emoji/*.png; do
            [ ! -f "$file" ] && continue
            fn=$(basename "$file")
            [ "$first" = true ] && first=false || echo "," >> "$CATALOG"
            printf '  {"name":"%s","file":"%s"}' "${fn%.png}" "$fn" >> "$CATALOG"
          done

          echo "" >> "$CATALOG"
          echo "]" >> "$CATALOG"
          cat "$CATALOG"

      - name: Install Gradle Wrapper
        run: |
          GRADLE_VER="8.5"
          curl -sL "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-${GRADLE_VER}/bin/gradle wrapper --gradle-version ${GRADLE_VER} --no-daemon
          rm -rf /tmp/gradle*
          chmod +x gradlew
          ./gradlew --version

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:+UseParallelGC"

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        continue-on-error: true

      - name: List APK files
        run: find . -name "*.apk" -type f -exec ls -lh {} \;

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CustomEmojiKeyboard-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 90
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: CustomEmojiKeyboard-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: warn

      - name: Build Summary
        if: always()
        run: |
          echo "## 📱 Custom Emoji Keyboard" >> $GITHUB_STEP_SUMMARY
          emoji_count=$(ls app/src/main/assets/emoji/*.png 2>/dev/null | wc -l)
          echo "### 😀 PNG emoji: ${emoji_count}" >> $GITHUB_STEP_SUMMARY

          if ls app/build/outputs/apk/debug/*.apk 1>/dev/null 2>&1; then
            for apk in app/build/outputs/apk/debug/*.apk; do
              sz=$(du -h "$apk" | cut -f1)
              echo "- ✅ **Debug:** \`$(basename $apk)\` ($sz)" >> $GITHUB_STEP_SUMMARY
            done
          fi
