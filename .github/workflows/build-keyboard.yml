name: Build Android Keyboard APK

on:
  push:
    branches:
      - main
      - master

  # Проверка каждые 24 часа (в 3:00 UTC)
  schedule:
    - cron: '0 3 * * *'

  # Ручной запуск
  workflow_dispatch:

jobs:
  build:
    name: Build Keyboard APK
    runs-on: ubuntu-latest

    steps:
      # ===== ШАГ 1: Клонирование репозитория =====
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: Nestor53top/Keyboard
          ref: main

      # ===== ШАГ 2: Настройка JDK 17 =====
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ===== ШАГ 3: Проверка и валидация эмодзи =====
      - name: Validate emoji files
        run: |
          echo "========================================="
          echo "  Проверка эмодзи из репозитория"
          echo "========================================="

          EMOJI_DIR="emoji"
          ERRORS=0
          VALID=0

          if [ ! -d "$EMOJI_DIR" ]; then
            echo "❌ ОШИБКА: Папка emoji/ не найдена!"
            exit 1
          fi

          FILE_COUNT=$(find "$EMOJI_DIR" -type f | wc -l)
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "❌ ОШИБКА: Папка emoji/ пуста!"
            exit 1
          fi

          echo "Найдено файлов: $FILE_COUNT"
          echo ""

          for file in "$EMOJI_DIR"/*; do
            [ ! -f "$file" ] && continue
            filename=$(basename "$file")
            ext="${filename##*.}"
            ext_lower=$(echo "$ext" | tr '[:upper:]' '[:lower:]')

            # ── Проверка 1: только PNG ──
            if [ "$ext_lower" != "png" ]; then
              echo "❌ ОТКЛОНЁН: $filename — формат .$ext (нужен .png)"
              ERRORS=$((ERRORS + 1))
              # Удаляем файл неправильного формата
              rm "$file"
              continue
            fi

            # ── Проверка 2: файл действительно PNG (magic bytes) ──
            MAGIC=$(xxd -l 4 -p "$file" 2>/dev/null)
            if [ "$MAGIC" != "89504e47" ]; then
              echo "❌ ОТКЛОНЁН: $filename — файл повреждён или не настоящий PNG"
              ERRORS=$((ERRORS + 1))
              rm "$file"
              continue
            fi

            # ── Проверка 3: размеры изображения ──
            if command -v identify &>/dev/null; then
              DIMENSIONS=$(identify -format "%wx%h" "$file" 2>/dev/null)
              WIDTH=$(echo "$DIMENSIONS" | cut -dx -f1)
              HEIGHT=$(echo "$DIMENSIONS" | cut -dx -f2)

              if [ "$WIDTH" != "$HEIGHT" ]; then
                echo "⚠️  ВНИМАНИЕ: $filename — не квадратный (${WIDTH}x${HEIGHT})"
              fi

              if [ "$WIDTH" -lt 64 ] 2>/dev/null || [ "$HEIGHT" -lt 64 ] 2>/dev/null; then
                echo "⚠️  ВНИМАНИЕ: $filename — слишком маленький (${WIDTH}x${HEIGHT}, мин. 64x64)"
              fi

              if [ "$WIDTH" -gt 512 ] 2>/dev/null || [ "$HEIGHT" -gt 512 ] 2>/dev/null; then
                echo "⚠️  ВНИМАНИЕ: $filename — слишком большой (${WIDTH}x${HEIGHT}, макс. 512x512)"
              fi

              echo "  ✅ $filename — ${WIDTH}x${HEIGHT} px — OK"
            else
              echo "  ✅ $filename — PNG валидный"
            fi

            # ── Проверка 4: имя файла ──
            NAME_PART="${filename%.*}"
            if echo "$NAME_PART" | grep -qP '[^a-zA-Z0-9_\-]'; then
              echo "  ⚠️  Имя содержит спецсимволы, будет нормализовано"
            fi

            VALID=$((VALID + 1))
          done

          echo ""
          echo "========================================="
          echo "  ИТОГО:"
          echo "  ✅ Валидных PNG: $VALID"
          echo "  ❌ Отклонённых:  $ERRORS"
          echo "========================================="

          if [ "$VALID" -eq 0 ]; then
            echo "❌ Нет ни одного валидного PNG эмодзи!"
            exit 1
          fi

      # ===== ШАГ 4: Создание структуры Android-проекта =====
      - name: Create Android project structure
        run: |
          mkdir -p app/src/main/java/com/custom/keyboard
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/drawable-nodpi
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/assets/emoji
          mkdir -p gradle/wrapper

          # ============================================
          # settings.gradle.kts
          # ============================================
          cat > settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "CustomEmojiKeyboard"
          include(":app")
          EOF

          # ============================================
          # build.gradle.kts (корневой)
          # ============================================
          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.2.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.21" apply false
          }
          EOF

          # ============================================
          # gradle.properties
          # ============================================
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          org.gradle.caching=true
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          kotlin.code.style=official
          EOF

          # ============================================
          # gradle-wrapper.properties
          # ============================================
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # ============================================
          # app/build.gradle.kts
          # ============================================
          cat > app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.custom.keyboard"
              compileSdk = 34

              defaultConfig {
                  applicationId = "com.custom.keyboard"
                  minSdk = 24
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0.0"
              }

              buildTypes {
                  debug {
                      isMinifyEnabled = false
                  }
                  release {
                      isMinifyEnabled = false
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }

              aaptOptions {
                  noCompress += listOf("png")
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.appcompat:appcompat:1.6.1")
              implementation("com.google.android.material:material:1.11.0")
              implementation("androidx.recyclerview:recyclerview:1.3.2")
              implementation("androidx.constraintlayout:constraintlayout:2.1.4")
          }
          EOF

          # ============================================
          # AndroidManifest.xml
          # ============================================
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_keyboard"
                  android:label="@string/app_name"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.MaterialComponents.Light.NoActionBar">

                  <activity
                      android:name=".SettingsActivity"
                      android:exported="true"
                      android:label="@string/app_name">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <service
                      android:name=".EmojiKeyboardService"
                      android:exported="true"
                      android:label="@string/keyboard_name"
                      android:permission="android.permission.BIND_INPUT_METHOD">
                      <intent-filter>
                          <action android:name="android.view.InputMethod" />
                      </intent-filter>
                      <meta-data
                          android:name="android.view.im"
                          android:resource="@xml/method" />
                  </service>
              </application>
          </manifest>
          EOF

          # ============================================
          # res/xml/method.xml
          # ============================================
          cat > app/src/main/res/xml/method.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <input-method
              xmlns:android="http://schemas.android.com/apk/res/android"
              android:settingsActivity="com.custom.keyboard.SettingsActivity"
              android:isDefault="false">
              <subtype
                  android:imeSubtypeMode="keyboard"
                  android:label="Emoji Keyboard"
                  android:imeSubtypeLocale="en_US" />
          </input-method>
          EOF

          # ============================================
          # res/values/strings.xml
          # ============================================
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Custom Emoji Keyboard</string>
              <string name="keyboard_name">Emoji Keyboard</string>
              <string name="enable_hint">Enable in Settings → System → Languages → On-screen keyboard</string>
              <string name="emoji_count">Custom emoji: %d</string>
              <string name="no_emoji">No emoji found</string>
          </resources>
          EOF

          # ============================================
          # res/values/colors.xml
          # ============================================
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="keyboard_bg">#FF1B1B2F</color>
              <color name="key_bg">#FF162447</color>
              <color name="key_pressed">#FF1F4068</color>
              <color name="key_text">#FFFFFFFF</color>
              <color name="accent">#FFE43F5A</color>
              <color name="divider">#33FFFFFF</color>
          </resources>
          EOF

          # ============================================
          # res/values/dimens.xml
          # ============================================
          cat > app/src/main/res/values/dimens.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <dimen name="keyboard_height">280dp</dimen>
              <dimen name="emoji_size">40dp</dimen>
              <dimen name="emoji_padding">6dp</dimen>
              <dimen name="grid_spacing">4dp</dimen>
          </resources>
          EOF

          # ============================================
          # res/drawable/ic_keyboard.xml
          # ============================================
          cat > app/src/main/res/drawable/ic_keyboard.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="48dp"
              android:height="48dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="#FFE43F5A"
                  android:pathData="M20,5H4C2.9,5 2,5.9 2,7v10c0,1.1 0.9,2 2,2h16c1.1,0 2,-0.9 2,-2V7C22,5.9 21.1,5 20,5zM11,8h2v2h-2V8zM11,11h2v2h-2V11zM8,8h2v2H8V8zM8,11h2v2H8V11zM7,13H5v-2h2V13zM7,10H5V8h2V10zM16,17H8v-2h8V17zM16,13h-2v-2h2V13zM16,10h-2V8h2V10zM19,13h-2v-2h2V13zM19,10h-2V8h2V10z"/>
          </vector>
          EOF

          # ============================================
          # res/drawable/emoji_item_bg.xml
          # ============================================
          cat > app/src/main/res/drawable/emoji_item_bg.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ripple xmlns:android="http://schemas.android.com/apk/res/android"
              android:color="@color/key_pressed">
              <item>
                  <shape android:shape="rectangle">
                      <corners android:radius="8dp" />
                      <solid android:color="@color/key_bg" />
                  </shape>
              </item>
          </ripple>
          EOF

          # ============================================
          # res/layout/keyboard_view.xml
          # ============================================
          cat > app/src/main/res/layout/keyboard_view.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="@dimen/keyboard_height"
              android:orientation="vertical"
              android:background="@color/keyboard_bg">

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="40dp"
                  android:orientation="horizontal"
                  android:gravity="center_vertical"
                  android:paddingStart="8dp"
                  android:paddingEnd="8dp"
                  android:background="@color/key_bg">

                  <TextView
                      android:id="@+id/tvCount"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:textColor="@color/key_text"
                      android:textSize="12sp" />

                  <ImageButton
                      android:id="@+id/btnBackspace"
                      android:layout_width="48dp"
                      android:layout_height="36dp"
                      android:background="@drawable/emoji_item_bg"
                      android:src="@android:drawable/ic_input_delete"
                      android:contentDescription="Backspace"
                      android:scaleType="centerInside" />
              </LinearLayout>

              <View
                  android:layout_width="match_parent"
                  android:layout_height="1dp"
                  android:background="@color/divider" />

              <androidx.recyclerview.widget.RecyclerView
                  android:id="@+id/rvEmoji"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:padding="@dimen/grid_spacing"
                  android:clipToPadding="false" />
          </LinearLayout>
          EOF

          # ============================================
          # res/layout/item_emoji.xml
          # ============================================
          cat > app/src/main/res/layout/item_emoji.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="wrap_content"
              android:background="@drawable/emoji_item_bg"
              android:padding="@dimen/emoji_padding">
              <ImageView
                  android:id="@+id/ivEmoji"
                  android:layout_width="@dimen/emoji_size"
                  android:layout_height="@dimen/emoji_size"
                  android:layout_gravity="center"
                  android:scaleType="fitCenter"
                  android:contentDescription="emoji" />
          </FrameLayout>
          EOF

          # ============================================
          # res/layout/activity_settings.xml
          # ============================================
          cat > app/src/main/res/layout/activity_settings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:gravity="center"
              android:padding="32dp"
              android:background="@color/keyboard_bg">

              <ImageView
                  android:layout_width="80dp"
                  android:layout_height="80dp"
                  android:src="@drawable/ic_keyboard"
                  android:layout_marginBottom="24dp"
                  android:contentDescription="icon" />

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="@string/app_name"
                  android:textSize="24sp"
                  android:textColor="@color/key_text"
                  android:textStyle="bold"
                  android:layout_marginBottom="16dp" />

              <TextView
                  android:id="@+id/tvInfo"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:textSize="16sp"
                  android:textColor="@color/key_text"
                  android:layout_marginBottom="24dp"
                  android:gravity="center" />

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="@string/enable_hint"
                  android:textSize="14sp"
                  android:textColor="#99FFFFFF"
                  android:gravity="center"
                  android:layout_marginBottom="24dp" />

              <Button
                  android:id="@+id/btnSettings"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Open Keyboard Settings"
                  android:backgroundTint="@color/accent" />

              <androidx.recyclerview.widget.RecyclerView
                  android:id="@+id/rvPreview"
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_weight="1"
                  android:layout_marginTop="24dp" />
          </LinearLayout>
          EOF

          echo "✅ Все ресурсы созданы"

      # ===== ШАГ 5: Создание Kotlin-кода =====
      - name: Create Kotlin source code
        run: |
          K="app/src/main/java/com/custom/keyboard"

          # ── EmojiItem.kt ──
          cat > "$K/EmojiItem.kt" << 'EOF'
          package com.custom.keyboard

          import android.graphics.Bitmap

          data class EmojiItem(
              val name: String,
              val fileName: String,
              val bitmap: Bitmap?
          )
          EOF

          # ── EmojiLoader.kt ──
          cat > "$K/EmojiLoader.kt" << 'EOF'
          package com.custom.keyboard

          import android.content.Context
          import android.graphics.BitmapFactory
          import android.util.Log
          import org.json.JSONArray

          object EmojiLoader {
              private const val TAG = "EmojiLoader"
              private const val DIR = "emoji"
              private const val CATALOG = "emoji/catalog.json"

              fun loadAll(ctx: Context): List<EmojiItem> {
                  val list = mutableListOf<EmojiItem>()

                  // Попытка 1: через catalog.json
                  try {
                      val json = ctx.assets.open(CATALOG)
                          .bufferedReader().use { it.readText() }
                      val arr = JSONArray(json)
                      for (i in 0 until arr.length()) {
                          val obj = arr.getJSONObject(i)
                          val name = obj.getString("name")
                          val file = obj.getString("file")

                          // Только PNG
                          if (!file.lowercase().endsWith(".png")) continue

                          val bmp = try {
                              ctx.assets.open("$DIR/$file").use {
                                  BitmapFactory.decodeStream(it)
                              }
                          } catch (e: Exception) { null }

                          if (bmp != null) list.add(EmojiItem(name, file, bmp))
                      }
                  } catch (e: Exception) {
                      Log.e(TAG, "Catalog failed", e)

                      // Попытка 2: сканирование папки
                      try {
                          val files = ctx.assets.list(DIR) ?: emptyArray()
                          for (f in files.sorted()) {
                              if (f == "catalog.json") continue
                              if (!f.lowercase().endsWith(".png")) continue

                              val bmp = try {
                                  ctx.assets.open("$DIR/$f").use {
                                      BitmapFactory.decodeStream(it)
                                  }
                              } catch (ex: Exception) { null }

                              if (bmp != null) {
                                  list.add(EmojiItem(
                                      f.substringBeforeLast("."), f, bmp
                                  ))
                              }
                          }
                      } catch (ex: Exception) {
                          Log.e(TAG, "Scan failed", ex)
                      }
                  }

                  Log.i(TAG, "Loaded ${list.size} PNG emoji")
                  return list
              }
          }
          EOF

          # ── EmojiAdapter.kt ──
          cat > "$K/EmojiAdapter.kt" << 'EOF'
          package com.custom.keyboard

          import android.view.LayoutInflater
          import android.view.View
          import android.view.ViewGroup
          import android.widget.ImageView
          import androidx.recyclerview.widget.RecyclerView

          class EmojiAdapter(
              private val items: List<EmojiItem>,
              private val onClick: (EmojiItem) -> Unit
          ) : RecyclerView.Adapter<EmojiAdapter.VH>() {

              class VH(v: View) : RecyclerView.ViewHolder(v) {
                  val iv: ImageView = v.findViewById(R.id.ivEmoji)
              }

              override fun onCreateViewHolder(p: ViewGroup, t: Int) =
                  VH(LayoutInflater.from(p.context)
                      .inflate(R.layout.item_emoji, p, false))

              override fun onBindViewHolder(h: VH, pos: Int) {
                  val e = items[pos]
                  h.iv.setImageBitmap(e.bitmap)
                  h.iv.contentDescription = e.name
                  h.itemView.setOnClickListener { onClick(e) }
              }

              override fun getItemCount() = items.size
          }
          EOF

          # ── EmojiKeyboardService.kt ──
          cat > "$K/EmojiKeyboardService.kt" << 'EOF'
          package com.custom.keyboard

          import android.inputmethodservice.InputMethodService
          import android.view.View
          import android.widget.ImageButton
          import android.widget.TextView
          import android.widget.Toast
          import androidx.recyclerview.widget.GridLayoutManager
          import androidx.recyclerview.widget.RecyclerView

          class EmojiKeyboardService : InputMethodService() {

              override fun onCreateInputView(): View {
                  val view = layoutInflater.inflate(R.layout.keyboard_view, null)
                  val emojis = EmojiLoader.loadAll(this)

                  view.findViewById<TextView>(R.id.tvCount).text =
                      getString(R.string.emoji_count, emojis.size)

                  val rv = view.findViewById<RecyclerView>(R.id.rvEmoji)
                  rv.layoutManager = GridLayoutManager(this, 6)
                  rv.adapter = EmojiAdapter(emojis) { emoji ->
                      currentInputConnection?.commitText(
                          ":${emoji.name}:", 1
                      )
                      Toast.makeText(this, emoji.name, Toast.LENGTH_SHORT).show()
                  }

                  view.findViewById<ImageButton>(R.id.btnBackspace).apply {
                      setOnClickListener {
                          currentInputConnection?.deleteSurroundingText(1, 0)
                      }
                      setOnLongClickListener {
                          currentInputConnection?.deleteSurroundingText(50, 0)
                          true
                      }
                  }

                  return view
              }
          }
          EOF

          # ── SettingsActivity.kt ──
          cat > "$K/SettingsActivity.kt" << 'EOF'
          package com.custom.keyboard

          import android.content.Intent
          import android.os.Bundle
          import android.provider.Settings
          import android.widget.Button
          import android.widget.TextView
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity
          import androidx.recyclerview.widget.GridLayoutManager
          import androidx.recyclerview.widget.RecyclerView

          class SettingsActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_settings)

                  val emojis = EmojiLoader.loadAll(this)

                  findViewById<TextView>(R.id.tvInfo).text =
                      if (emojis.isEmpty()) getString(R.string.no_emoji)
                      else getString(R.string.emoji_count, emojis.size)

                  val rv = findViewById<RecyclerView>(R.id.rvPreview)
                  rv.layoutManager = GridLayoutManager(this, 5)
                  rv.adapter = EmojiAdapter(emojis) {
                      Toast.makeText(this, it.name, Toast.LENGTH_SHORT).show()
                  }

                  findViewById<Button>(R.id.btnSettings).setOnClickListener {
                      startActivity(Intent(Settings.ACTION_INPUT_METHOD_SETTINGS))
                  }
              }
          }
          EOF

          echo "✅ Kotlin-код создан"

      # ===== ШАГ 6: Копирование ТОЛЬКО PNG эмодзи =====
      - name: Copy PNG emoji to app resources
        run: |
          EMOJI_SRC="emoji"
          DRAWABLE="app/src/main/res/drawable-nodpi"
          ASSETS="app/src/main/assets/emoji"

          count=0
          skipped=0

          for file in "$EMOJI_SRC"/*; do
            [ ! -f "$file" ] && continue
            filename=$(basename "$file")
            ext="${filename##*.}"
            ext_lower=$(echo "$ext" | tr '[:upper:]' '[:lower:]')

            # ── СТРОГО ТОЛЬКО PNG ──
            if [ "$ext_lower" != "png" ]; then
              echo "  ⛔ ПРОПУСК: $filename (не PNG)"
              skipped=$((skipped + 1))
              continue
            fi

            # Проверка magic bytes
            MAGIC=$(xxd -l 4 -p "$file" 2>/dev/null)
            if [ "$MAGIC" != "89504e47" ]; then
              echo "  ⛔ ПРОПУСК: $filename (повреждённый PNG)"
              skipped=$((skipped + 1))
              continue
            fi

            # Нормализация имени для Android
            safe=$(echo "${filename%.*}" \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/[^a-z0-9_]/_/g' \
              | sed 's/__*/_/g' \
              | sed 's/^_//;s/_$//')

            # Имя должно начинаться с буквы
            [[ ! "$safe" =~ ^[a-z] ]] && safe="emoji_${safe}"

            cp "$file" "$DRAWABLE/${safe}.png"
            cp "$file" "$ASSETS/${safe}.png"
            echo "  ✅ $filename → ${safe}.png"
            count=$((count + 1))
          done

          echo ""
          echo "══════════════════════════════"
          echo "  PNG скопировано: $count"
          echo "  Пропущено:      $skipped"
          echo "══════════════════════════════"

      # ===== ШАГ 7: Генерация каталога =====
      - name: Generate emoji catalog
        run: |
          CATALOG="app/src/main/assets/emoji/catalog.json"
          echo "[" > "$CATALOG"
          first=true

          for file in app/src/main/assets/emoji/*.png; do
            [ ! -f "$file" ] && continue
            fn=$(basename "$file")

            [ "$first" = true ] && first=false || echo "," >> "$CATALOG"
            printf '  {"name":"%s","file":"%s"}' "${fn%.png}" "$fn" >> "$CATALOG"
          done

          echo "" >> "$CATALOG"
          echo "]" >> "$CATALOG"

          echo "catalog.json:"
          cat "$CATALOG"

      # ===== ШАГ 8: Установка Gradle Wrapper =====
      - name: Install Gradle Wrapper
        run: |
          GRADLE_VER="8.5"

          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            curl -sL \
              "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip" \
              -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/
            /tmp/gradle-${GRADLE_VER}/bin/gradle wrapper \
              --gradle-version ${GRADLE_VER} --no-daemon
            rm -rf /tmp/gradle*
          fi

          chmod +x gradlew
          ./gradlew --version

      # ===== ШАГ 9: Кэширование Gradle =====
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ===== ШАГ 10: Сборка Debug APK =====
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:+UseParallelGC"

      # ===== ШАГ 11: Сборка Release APK =====
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        continue-on-error: true
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:+UseParallelGC"

      # ===== ШАГ 12: Список APK =====
      - name: List APK files
        run: find . -name "*.apk" -type f -exec ls -lh {} \;

      # ===== ШАГ 13: Загрузка Debug APK =====
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CustomEmojiKeyboard-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 90
          if-no-files-found: error

      # ===== ШАГ 14: Загрузка Release APK =====
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: CustomEmojiKeyboard-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: warn

      # ===== ШАГ 15: Сводка =====
      - name: Build Summary
        if: always()
        run: |
          echo "## 📱 Custom Emoji Keyboard" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Репозиторий:** Nestor53top/Keyboard" >> $GITHUB_STEP_SUMMARY
          echo "**Триггер:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          emoji_count=$(ls app/src/main/assets/emoji/*.png 2>/dev/null | wc -l)
          echo "### 😀 PNG emoji: ${emoji_count}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Файл | Размер |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY

          for png in app/src/main/assets/emoji/*.png; do
            [ ! -f "$png" ] && continue
            fn=$(basename "$png")
            sz=$(du -h "$png" | cut -f1)
            echo "| 🖼️ $fn | $sz |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 APK:" >> $GITHUB_STEP_SUMMARY

          if ls app/build/outputs/apk/debug/*.apk 1>/dev/null 2>&1; then
            for apk in app/build/outputs/apk/debug/*.apk; do
              sz=$(du -h "$apk" | cut -f1)
              echo "- ✅ **Debug:** \`$(basename $apk)\` ($sz)" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "- ❌ Debug failed" >> $GITHUB_STEP_SUMMARY
          fi

          if ls app/build/outputs/apk/release/*.apk 1>/dev/null 2>&1; then
            for apk in app/build/outputs/apk/release/*.apk; do
              sz=$(du -h "$apk" | cut -f1)
              echo "- ✅ **Release:** \`$(basename $apk)\` ($sz)" >> $GITHUB_STEP_SUMMARY
            done
          fi
