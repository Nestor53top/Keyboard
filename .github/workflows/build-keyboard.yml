name: Build Full Custom Keyboard

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  build:
    name: Build Keyboard APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: Nestor53top/Keyboard
          ref: main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Validate emoji
        run: |
          EMOJI_DIR="emoji"
          [ ! -d "$EMOJI_DIR" ] && echo "❌ emoji/ not found" && exit 1
          VALID=0
          for f in "$EMOJI_DIR"/*; do
            [ ! -f "$f" ] && continue
            ext=$(echo "${f##*.}" | tr '[:upper:]' '[:lower:]')
            [ "$ext" != "png" ] && rm "$f" && continue
            M=$(xxd -l 4 -p "$f" 2>/dev/null)
            [ "$M" != "89504e47" ] && rm "$f" && continue
            VALID=$((VALID+1))
          done
          echo "Valid PNG: $VALID"
          [ "$VALID" -eq 0 ] && exit 1 || true

      - name: Create full Android project
        run: |
          mkdir -p app/src/main/java/com/custom/keyboard
          mkdir -p app/src/main/res/{drawable,drawable-nodpi,layout,values,values-night,xml,raw,mipmap-hdpi,mipmap-xhdpi,mipmap-xxhdpi,anim}
          mkdir -p app/src/main/assets/emoji
          mkdir -p gradle/wrapper

          # ══════════════════════════════════════
          # settings.gradle.kts
          # ══════════════════════════════════════
          cat > settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "NestorKeyboard"
          include(":app")
          EOF

          # ══════════════════════════════════════
          # build.gradle.kts (root)
          # ══════════════════════════════════════
          cat > build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application") version "8.2.0" apply false
              id("org.jetbrains.kotlin.android") version "1.9.21" apply false
          }
          EOF

          # ══════════════════════════════════════
          # gradle.properties
          # ══════════════════════════════════════
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          org.gradle.caching=true
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          EOF

          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # ══════════════════════════════════════
          # app/build.gradle.kts
          # ══════════════════════════════════════
          cat > app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }
          android {
              namespace = "com.custom.keyboard"
              compileSdk = 34
              defaultConfig {
                  applicationId = "com.custom.keyboard"
                  minSdk = 24
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0.0"
              }
              buildTypes {
                  debug { isMinifyEnabled = false }
                  release { isMinifyEnabled = false }
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = "17" }
              aaptOptions { noCompress += listOf("png") }
              buildFeatures { viewBinding = true }
          }
          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.appcompat:appcompat:1.6.1")
              implementation("com.google.android.material:material:1.11.0")
              implementation("androidx.recyclerview:recyclerview:1.3.2")
              implementation("androidx.constraintlayout:constraintlayout:2.1.4")
              implementation("androidx.viewpager2:viewpager2:1.0.0")
              implementation("androidx.preference:preference-ktx:1.2.1")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.7.0")
          }
          EOF

          # ══════════════════════════════════════
          # AndroidManifest.xml
          # ══════════════════════════════════════
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.VIBRATE" />
              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_keyboard"
                  android:label="@string/app_name"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">

                  <activity
                      android:name=".SettingsActivity"
                      android:exported="true"
                      android:label="@string/app_name"
                      android:theme="@style/AppTheme">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <service
                      android:name=".NestorKeyboardService"
                      android:exported="true"
                      android:label="@string/keyboard_name"
                      android:permission="android.permission.BIND_INPUT_METHOD">
                      <intent-filter>
                          <action android:name="android.view.InputMethod" />
                      </intent-filter>
                      <meta-data
                          android:name="android.view.im"
                          android:resource="@xml/method" />
                  </service>

                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>
              </application>
          </manifest>
          EOF

          # ══════════════════════════════════════
          # XML configs
          # ══════════════════════════════════════
          cat > app/src/main/res/xml/method.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <input-method xmlns:android="http://schemas.android.com/apk/res/android"
              android:settingsActivity="com.custom.keyboard.SettingsActivity"
              android:isDefault="false"
              android:supportsSwitchingToNextInputMethod="true">
              <subtype android:imeSubtypeMode="keyboard"
                  android:label="English" android:imeSubtypeLocale="en_US" />
              <subtype android:imeSubtypeMode="keyboard"
                  android:label="Русский" android:imeSubtypeLocale="ru_RU" />
          </input-method>
          EOF

          cat > app/src/main/res/xml/file_paths.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths><cache-path name="emoji_images" path="emoji/" /></paths>
          EOF

          # ══════════════════════════════════════
          # values/strings.xml
          # ══════════════════════════════════════
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Nestor Keyboard</string>
              <string name="keyboard_name">Nestor Keyboard</string>
              <string name="emoji_count">Emoji: %d</string>
              <string name="no_emoji">No emoji found</string>
              <string name="enable_hint">Enable in Settings → System → Keyboard</string>
              <string name="tab_qwerty">ABC</string>
              <string name="tab_emoji">😀</string>
              <string name="tab_numbers">123</string>
              <string name="tab_symbols">#+=</string>
              <string name="copied">Copied to clipboard</string>
          </resources>
          EOF

          # ══════════════════════════════════════
          # values/colors.xml
          # ══════════════════════════════════════
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="kb_bg">#FF1A1A2E</color>
              <color name="kb_bg_gradient_end">#FF16213E</color>
              <color name="key_bg">#FF0F3460</color>
              <color name="key_bg_pressed">#FF533483</color>
              <color name="key_bg_special">#FF1A1A40</color>
              <color name="key_bg_space">#FF0F3460</color>
              <color name="key_bg_enter">#FF533483</color>
              <color name="key_text">#FFFFFFFF</color>
              <color name="key_text_secondary">#CCFFFFFF</color>
              <color name="key_text_special">#FFE94560</color>
              <color name="accent">#FFE94560</color>
              <color name="accent_light">#FFFF6B6B</color>
              <color name="divider">#22FFFFFF</color>
              <color name="preview_bg">#FF533483</color>
              <color name="tab_active">#FFE94560</color>
              <color name="tab_inactive">#66FFFFFF</color>
              <color name="popup_bg">#FF1A1A2E</color>
              <color name="suggestion_bg">#FF16213E</color>
              <color name="emoji_category_bg">#FF0F3460</color>
              <color name="ripple_color">#33E94560</color>
          </resources>
          EOF

          # ══════════════════════════════════════
          # values-night/colors.xml
          # ══════════════════════════════════════
          cat > app/src/main/res/values-night/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="kb_bg">#FF0D0D1A</color>
              <color name="key_bg">#FF1A1A2E</color>
              <color name="key_bg_pressed">#FF3D1F5C</color>
          </resources>
          EOF

          # ══════════════════════════════════════
          # values/dimens.xml
          # ══════════════════════════════════════
          cat > app/src/main/res/values/dimens.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <dimen name="keyboard_height">260dp</dimen>
              <dimen name="key_height">48dp</dimen>
              <dimen name="key_margin">3dp</dimen>
              <dimen name="key_radius">10dp</dimen>
              <dimen name="key_text_size">20sp</dimen>
              <dimen name="key_text_secondary_size">11sp</dimen>
              <dimen name="space_height">42dp</dimen>
              <dimen name="tab_height">38dp</dimen>
              <dimen name="emoji_size">36dp</dimen>
              <dimen name="emoji_padding">5dp</dimen>
              <dimen name="preview_text_size">28sp</dimen>
              <dimen name="suggestion_height">36dp</dimen>
          </resources>
          EOF

          # ══════════════════════════════════════
          # values/styles.xml
          # ══════════════════════════════════════
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/accent</item>
                  <item name="colorPrimaryVariant">@color/key_bg</item>
                  <item name="colorOnPrimary">@color/key_text</item>
                  <item name="colorSecondary">@color/accent_light</item>
                  <item name="android:windowBackground">@color/kb_bg</item>
                  <item name="android:statusBarColor">@color/kb_bg</item>
                  <item name="android:navigationBarColor">@color/kb_bg</item>
              </style>
          </resources>
          EOF

          # ══════════════════════════════════════
          # DRAWABLES
          # ══════════════════════════════════════

          # Иконка приложения
          cat > app/src/main/res/drawable/ic_keyboard.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#FF1A1A2E"
                  android:pathData="M0,0h108v108H0z"/>
              <path android:fillColor="#FFE94560"
                  android:pathData="M24,35h60c3.3,0 6,2.7 6,6v26c0,3.3 -2.7,6 -6,6H24c-3.3,0 -6,-2.7 -6,-6V41c0,-3.3 2.7,-6 6,-6zM36,44h6v6h-6v-6zM36,53h6v6h-6v-6zM45,44h6v6h-6v-6zM45,53h6v6h-6v-6zM57,44h6v6h-6v-6zM57,53h6v6h-6v-6zM66,44h6v6h-6v-6zM27,44h6v6h-6v-6zM27,53h6v6h-6v-6zM66,53h6v6h-6v-6zM39,62h30v5H39v-5z"/>
          </vector>
          EOF

          # Фон кнопки
          cat > app/src/main/res/drawable/key_bg.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ripple xmlns:android="http://schemas.android.com/apk/res/android"
              android:color="@color/ripple_color">
              <item><shape android:shape="rectangle">
                  <corners android:radius="@dimen/key_radius"/>
                  <solid android:color="@color/key_bg"/>
              </shape></item>
          </ripple>
          EOF

          # Фон спецкнопки
          cat > app/src/main/res/drawable/key_bg_special.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ripple xmlns:android="http://schemas.android.com/apk/res/android"
              android:color="@color/ripple_color">
              <item><shape android:shape="rectangle">
                  <corners android:radius="@dimen/key_radius"/>
                  <solid android:color="@color/key_bg_special"/>
              </shape></item>
          </ripple>
          EOF

          # Фон Enter
          cat > app/src/main/res/drawable/key_bg_enter.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ripple xmlns:android="http://schemas.android.com/apk/res/android"
              android:color="@color/ripple_color">
              <item><shape android:shape="rectangle">
                  <corners android:radius="@dimen/key_radius"/>
                  <solid android:color="@color/key_bg_enter"/>
              </shape></item>
          </ripple>
          EOF

          # Фон пробела
          cat > app/src/main/res/drawable/key_bg_space.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ripple xmlns:android="http://schemas.android.com/apk/res/android"
              android:color="@color/ripple_color">
              <item><shape android:shape="rectangle">
                  <corners android:radius="20dp"/>
                  <solid android:color="@color/key_bg_space"/>
                  <stroke android:width="1dp" android:color="@color/divider"/>
              </shape></item>
          </ripple>
          EOF

          # Фон эмодзи
          cat > app/src/main/res/drawable/emoji_item_bg.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ripple xmlns:android="http://schemas.android.com/apk/res/android"
              android:color="@color/ripple_color">
              <item><shape android:shape="rectangle">
                  <corners android:radius="8dp"/>
                  <solid android:color="@android:color/transparent"/>
              </shape></item>
          </ripple>
          EOF

          # Фон таба
          cat > app/src/main/res/drawable/tab_bg.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ripple xmlns:android="http://schemas.android.com/apk/res/android"
              android:color="@color/ripple_color">
              <item><shape android:shape="rectangle">
                  <solid android:color="@android:color/transparent"/>
              </shape></item>
          </ripple>
          EOF

          # Фон активного таба
          cat > app/src/main/res/drawable/tab_bg_active.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android"
              android:shape="rectangle">
              <solid android:color="@android:color/transparent"/>
              <padding android:bottom="2dp"/>
          </shape>
          EOF

          # Индикатор таба
          cat > app/src/main/res/drawable/tab_indicator.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android"
              android:shape="rectangle">
              <size android:height="3dp"/>
              <corners android:radius="2dp"/>
              <solid android:color="@color/accent"/>
          </shape>
          EOF

          # Preview фон
          cat > app/src/main/res/drawable/key_preview_bg.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android"
              android:shape="rectangle">
              <corners android:radius="12dp"/>
              <solid android:color="@color/preview_bg"/>
              <stroke android:width="1dp" android:color="@color/accent"/>
          </shape>
          EOF

          # Иконки
          cat > app/src/main/res/drawable/ic_backspace.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp" android:height="24dp"
              android:viewportWidth="24" android:viewportHeight="24">
              <path android:fillColor="@color/key_text"
                  android:pathData="M22,3H7c-0.69,0-1.23,0.35-1.59,0.88L0,12l5.41,8.11C5.77,20.64 6.31,21 7,21h15c1.1,0 2,-0.9 2,-2V5C24,3.9 23.1,3 22,3zM19,15.59L17.59,17L14,13.41L10.41,17L9,15.59L12.59,12L9,8.41L10.41,7L14,10.59L17.59,7L19,8.41L15.41,12L19,15.59z"/>
          </vector>
          EOF

          cat > app/src/main/res/drawable/ic_shift.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp" android:height="24dp"
              android:viewportWidth="24" android:viewportHeight="24">
              <path android:fillColor="@color/key_text"
                  android:pathData="M7.41,15.41L12,10.83l4.59,4.58L18,14l-6,-6 -6,6z"/>
          </vector>
          EOF

          cat > app/src/main/res/drawable/ic_shift_locked.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp" android:height="24dp"
              android:viewportWidth="24" android:viewportHeight="24">
              <path android:fillColor="@color/accent"
                  android:pathData="M7.41,15.41L12,10.83l4.59,4.58L18,14l-6,-6 -6,6z"/>
              <path android:fillColor="@color/accent"
                  android:pathData="M6,19h12v2H6z"/>
          </vector>
          EOF

          cat > app/src/main/res/drawable/ic_enter.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp" android:height="24dp"
              android:viewportWidth="24" android:viewportHeight="24">
              <path android:fillColor="@color/key_text"
                  android:pathData="M19,7v4H5.83l3.58,-3.59L8,6l-6,6 6,6 1.41,-1.41L5.83,13H21V7z"/>
          </vector>
          EOF

          cat > app/src/main/res/drawable/ic_language.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp" android:height="24dp"
              android:viewportWidth="24" android:viewportHeight="24">
              <path android:fillColor="@color/key_text"
                  android:pathData="M11.99,2C6.47,2 2,6.48 2,12s4.47,10 9.99,10C17.52,22 22,17.52 22,12S17.52,2 11.99,2zM18.92,8h-2.95c-0.32,-1.25 -0.78,-2.45 -1.38,-3.56 1.84,0.63 3.37,1.91 4.33,3.56zM12,4.04c0.83,1.2 1.48,2.53 1.91,3.96h-3.82c0.43,-1.43 1.08,-2.76 1.91,-3.96zM4.26,14C4.1,13.36 4,12.69 4,12s0.1,-1.36 0.26,-2h3.38c-0.08,0.66 -0.14,1.32 -0.14,2 0,0.68 0.06,1.34 0.14,2H4.26zM5.08,16h2.95c0.32,1.25 0.78,2.45 1.38,3.56 -1.84,-0.63 -3.37,-1.9 -4.33,-3.56zM8.03,8H5.08c0.96,-1.66 2.49,-2.93 4.33,-3.56C8.81,5.55 8.35,6.75 8.03,8zM12,19.96c-0.83,-1.2 -1.48,-2.53 -1.91,-3.96h3.82c-0.43,1.43 -1.08,2.76 -1.91,3.96zM14.34,14H9.66c-0.09,-0.66 -0.16,-1.32 -0.16,-2 0,-0.68 0.07,-1.35 0.16,-2h4.68c0.09,0.65 0.16,1.32 0.16,2 0,0.68 -0.07,1.34 -0.16,2zM14.59,19.56c0.6,-1.11 1.06,-2.31 1.38,-3.56h2.95c-0.96,1.65 -2.49,2.93 -4.33,3.56zM16.36,14c0.08,-0.66 0.14,-1.32 0.14,-2 0,-0.68 -0.06,-1.34 -0.14,-2h3.38c0.16,0.64 0.26,1.31 0.26,2s-0.1,1.36 -0.26,2h-3.38z"/>
          </vector>
          EOF

          cat > app/src/main/res/drawable/ic_emoji.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp" android:height="24dp"
              android:viewportWidth="24" android:viewportHeight="24">
              <path android:fillColor="@color/key_text"
                  android:pathData="M11.99,2C6.47,2 2,6.48 2,12s4.47,10 9.99,10C17.52,22 22,17.52 22,12S17.52,2 11.99,2zM12,20c-4.42,0 -8,-3.58 -8,-8s3.58,-8 8,-8 8,3.58 8,8 -3.58,8 -8,8zM15.5,11c0.83,0 1.5,-0.67 1.5,-1.5S16.33,8 15.5,8 14,8.67 14,9.5s0.67,1.5 1.5,1.5zM8.5,11c0.83,0 1.5,-0.67 1.5,-1.5S9.33,8 8.5,8 7,8.67 7,9.5 7.67,11 8.5,11zM12,17.5c2.33,0 4.31,-1.46 5.11,-3.5H6.89c0.8,2.04 2.78,3.5 5.11,3.5z"/>
          </vector>
          EOF

          cat > app/src/main/res/drawable/ic_settings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp" android:height="24dp"
